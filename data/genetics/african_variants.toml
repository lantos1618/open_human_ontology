# African Genetic Variants - Ground Truth Data
# Sources:
# - Sickle Cell: Zhang et al. (2025) J Transl Med 23:997 - "Human genetic variations conferring resistance to malaria"
# - G6PD Deficiency: Ghosh (2025) Human Biology - "Prevalence of G6PD Deficiency"
# - APOL1: Gbadegesin et al. (2024) NEJM 392(3):228-238 - "APOL1 Variants and CKD in West Africans"
# - Duffy: Nature Scientific Reports (2022) "Prevalence and risk of P. vivax infection among Duffy-negative"
# - Lactase: Population prevalence ~15% in sub-Saharan Africa (established literature)
# - Hypertension: Higher salt sensitivity documented in African populations (established literature)

[default_profile]
# Default African ancestry genetic profile

[default_profile.sickle_cell]
status = "Normal"
carrier_prevalence = 0.20  # ~20% carrier rate in malaria-endemic regions of Africa
disease_prevalence = 0.01  # ~1% HbSS disease prevalence

[default_profile.g6pd_deficiency]
status = "Normal"
# Male prevalence 16.48%, female 8.16% (Ghosh 2025)
male_prevalence = 0.1648
female_prevalence = 0.0816
# A- variant most common in Africa
variant_frequencies = { "AMinus" = 0.60, "Mediterranean" = 0.10, "Canton" = 0.05, "Deficient" = 0.25 }

[default_profile.lactase_persistence]
c_14010_status = "Absent"
# Lactase persistence low in African populations (~10-15%)
persistence_probability = 0.15

[default_profile.skin_pigmentation]
mc1r_variants = []
slc24a5_genotype = "Homozygous"  # Ancestral allele fixed in African populations
slc45a2_genotype = "Homozygous"  # Ancestral allele
tyrosinase_variants = []
melanin_index = 0.85  # High melanin production

[default_profile.malaria_resistance]
hbs_sickle = false
hbc_hemoglobin_c = false
# Duffy-negative phenotype 98-100% in West/Central Africa (Nature Sci Rep 2022)
duffy_negative = false
duffy_negative_prevalence = 0.99  # Nearly fixed in West/Central Africa
g6pd_deficiency = false
alpha_thalassemia = false
resistance_score = 0.0

[default_profile.hypertension_risk]
agt_m235t = "Heterozygous"
ace_id_polymorphism = "Heterozygous"
crp_variants = []
# Higher salt sensitivity documented in African populations
salt_sensitivity = 0.6
risk_multiplier = 1.3

[default_profile.vitamin_d_metabolism]
cyp2r1_genotype = "Homozygous"
gc_genotype = "Heterozygous"
# Higher melanin reduces vitamin D synthesis efficiency
darker_skin_factor = 0.3
synthesis_efficiency = 0.35  # ~65% reduction due to melanin

[default_profile.apol1_kidney_risk]
# APOL1 risk variants: G1 and G2
# Monoallelic prevalence: 43.0%, Biallelic: 29.7% (Gbadegesin et al. NEJM 2024)
status = "G0G0"
g0g0_prevalence = 0.273  # 27.3% no risk alleles
monoallelic_prevalence = 0.430  # 43.0% one risk allele
biallelic_prevalence = 0.297  # 29.7% two risk alleles

# Risk multipliers from NEJM 2024 study and other literature
# Note: Different studies report different metrics:
# - NEJM 2024: Odds ratios (OR) for CKD prevalence (1.18-1.25x)
# - Other studies: Relative risk for ESKD/FSGS development (5-7x higher rates)
# We use the higher FSGS/ESKD risk multiplier which is more clinically relevant
[apol1_risk_multipliers]
g0g0 = 1.0  # Baseline risk
monoallelic = 1.18  # Mild increase (OR 1.18 for CKD prevalence)
biallelic = 7.0  # 5-7 fold increased risk for FSGS and kidney disease progression
# Focal segmental glomerulosclerosis (FSGS) specific risk
fsgs_monoallelic = 1.61  # 61% increased risk
fsgs_biallelic = 1.84  # 84% increased odds, but absolute risk much higher in practice

# Preset: Sickle Cell Trait (Carrier)
[sickle_cell_trait]
sickle_cell_status = "Carrier"

[sickle_cell_trait.malaria_resistance]
hbs_sickle = true
hbc_hemoglobin_c = false
duffy_negative = false
g6pd_deficiency = false
alpha_thalassemia = false
# Sickle cell trait provides strong malaria protection (Zhang et al. 2025)
resistance_score = 0.6

# Preset: G6PD Deficiency (A- variant)
[g6pd_deficiency_aminus]
g6pd_status = "AMinus"

[g6pd_deficiency_aminus.malaria_resistance]
hbs_sickle = false
hbc_hemoglobin_c = false
duffy_negative = false
g6pd_deficiency = true
alpha_thalassemia = false
# G6PD deficiency provides partial malaria protection
resistance_score = 0.4

[g6pd_deficiency_aminus.pharmacogenomics]
oxidative_drugs = "Avoid primaquine, dapsone, nitrofurantoin, rasburicase"

# Preset: Duffy-Negative (FY*O/FY*O)
[duffy_negative]
[duffy_negative.malaria_resistance]
hbs_sickle = false
hbc_hemoglobin_c = false
# Duffy-negative provides near-complete P. vivax resistance
duffy_negative = true
g6pd_deficiency = false
alpha_thalassemia = false
# Very high protection against P. vivax malaria (Nature Sci Rep 2022)
resistance_score = 0.9

# Preset: APOL1 High-Risk (Two risk alleles)
[apol1_high_risk]
apol1_status = "G1G1"  # or G1G2, G2G2

[apol1_high_risk.kidney_risk]
# 7-fold increased risk for kidney disease with two APOL1 risk alleles
ckd_risk_multiplier = 7.0
# Based on NEJM 2024: biallelic carriers have 25% higher odds of CKD
# and 84% higher odds of FSGS
fsgs_risk_multiplier = 10.0

# Combined protective profile
[high_malaria_protection]
[high_malaria_protection.malaria_resistance]
hbs_sickle = true
hbc_hemoglobin_c = false
duffy_negative = true
g6pd_deficiency = true
alpha_thalassemia = true
# Multiple protective factors provide cumulative resistance
resistance_score = 0.95
