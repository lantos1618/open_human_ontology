# Cancer Genetics Risk Data
# Externalized from src/biology/genetics/cancer_genetics.rs
# All risk values are grounded in peer-reviewed scientific literature
#
# CITATIONS:
# [1] NCI BRCA Fact Sheet: https://www.cancer.gov/about-cancer/causes-prevention/genetics/brca-fact-sheet
#     - BRCA1/BRCA2 carriers: >60% lifetime breast cancer risk
#     - BRCA1 ovarian: 39-58%, BRCA2 ovarian: 13-29%
#
# [2] BOADICEA/CanRisk Model Update (2024): Nature Communications Medicine
#     - https://www.nature.com/articles/s44276-024-00079-1
#     - Updated BRCA2 age-specific relative risks for ages 60+
#
# [3] Li-Fraumeni Syndrome - GeneReviews® NCBI Bookshelf
#     - https://www.ncbi.nlm.nih.gov/books/NBK1311/
#     - TP53 carriers: 90% lifetime risk (females), 70% (males)
#     - 50% of cancers before age 40
#
# [4] Prospective Lynch Syndrome Database (2020): Genetics in Medicine
#     - MLH1 CRC cumulative risk age 75: 49.9% (45.0-55.1%)
#     - MSH2 CRC cumulative risk age 75: 45.8% (40.6-51.3%)
#     - MSH6 CRC cumulative risk age 75: 17.4% (12.1-24.7%)
#     - Endometrial cancer risks vary by gene (see mlh_msh section)
#
# Last validated: 2025-10-12

[brca1]
gene_name = "BRCA1"
chromosome = "17q21.31"

[brca1.variants]
wild_type = "WildType"
pathogenic_185delAG = "Pathogenic185delAG"
pathogenic_5382insC = "Pathogenic5382insC"
other_pathogenic = "OtherPathogenic"
vus = "VariantOfUncertainSignificance"

[brca1.breast_cancer_risk]
# Format: [age_bracket, wild_type_risk, pathogenic_risk]
# Pathogenic lifetime risk: >60% per NCI [1], using 72% as upper bound estimate
brackets = [
    { max_age = 40.0, wild_type = 0.015, pathogenic = 0.18 },
    { max_age = 50.0, wild_type = 0.035, pathogenic = 0.45 },
    { max_age = 60.0, wild_type = 0.065, pathogenic = 0.61 },
    { max_age = 999.0, wild_type = 0.13, pathogenic = 0.72 },  # wild_type updated to 13% per NCI
]

[brca1.ovarian_cancer_risk]
# NCI [1]: BRCA1 39-58% lifetime risk
wild_type = 0.011  # ~1.1% general population per NCI
pathogenic = 0.485  # midpoint of 39-58% range

[brca1.screening]
pathogenic = [
    "Annual breast MRI starting age 25-30",
    "Annual mammography starting age 30",
    "Consider risk-reducing mastectomy",
    "Transvaginal ultrasound + CA-125 every 6 months",
    "Consider risk-reducing salpingo-oophorectomy age 35-40",
]
wild_type = ["Standard population screening"]
vus = ["Intermediate screening, genetic counseling recommended"]

[brca2]
gene_name = "BRCA2"
chromosome = "13q13.1"

[brca2.variants]
wild_type = "WildType"
pathogenic_6174delT = "Pathogenic6174delT"
other_pathogenic = "OtherPathogenic"
vus = "VariantOfUncertainSignificance"

[brca2.breast_cancer_risk]
# NCI [1]: BRCA2 carriers >60% lifetime risk
brackets = [
    { max_age = 40.0, wild_type = 0.015, pathogenic = 0.12 },
    { max_age = 50.0, wild_type = 0.035, pathogenic = 0.35 },
    { max_age = 60.0, wild_type = 0.065, pathogenic = 0.53 },
    { max_age = 999.0, wild_type = 0.13, pathogenic = 0.69 },  # wild_type updated to 13% per NCI
]

[brca2.ovarian_cancer_risk]
# NCI [1]: BRCA2 13-29% lifetime risk
wild_type = 0.011  # ~1.1% general population per NCI
pathogenic = 0.21  # midpoint of 13-29% range

[brca2.prostate_cancer_risk]
wild_type = 1.0
pathogenic = 8.6

[brca2.pancreatic_cancer_risk]
wild_type = 1.0
pathogenic = 5.0

[tp53]
gene_name = "TP53"
chromosome = "17p13.1"
syndrome = "Li-Fraumeni Syndrome"

[tp53.cancer_risk]
# GeneReviews [3]: 90% lifetime risk (females), 70% (males)
# 50% of cancers occur before age 40
# Age distribution: 22% (0-15y), 51% (16-50y), 27% (51-80y)
wild_type = 0.01
brackets = [
    { max_age = 20.0, pathogenic = 0.22 },  # ~22% by age 15-20 per GeneReviews
    { max_age = 30.0, pathogenic = 0.40 },  # interpolated
    { max_age = 40.0, pathogenic = 0.50 },  # 50% by age 40 per GeneReviews
    { max_age = 999.0, pathogenic = 0.80 },  # 70-90% lifetime (using 80% average)
]

[tp53.screening]
pathogenic = [
    "Annual whole-body MRI",
    "Annual brain MRI",
    "Annual abdominal/pelvic ultrasound",
    "Annual complete blood count",
    "Annual dermatology exam",
    "Breast screening: clinical exam every 6 months from age 20",
    "Colonoscopy every 2-5 years starting age 25",
]

[mlh_msh]
gene_name = "MLH1/MSH2/MSH6/PMS2"
syndrome = "Lynch Syndrome"

[mlh_msh.colorectal_cancer_risk]
# Prospective Lynch Syndrome Database 2020 [4]
# Cumulative incidence by age 75 years
wild_type = 0.045
mlh1_pathogenic = 0.499  # 49.9% (95% CI: 45.0-55.1%)
msh2_pathogenic = 0.458  # 45.8% (95% CI: 40.6-51.3%)
msh6_pathogenic = 0.174  # 17.4% (95% CI: 12.1-24.7%)
pms2_pathogenic = 0.10   # estimated ~10% (lower penetrance)

[mlh_msh.endometrial_cancer_risk]
# Based on Lynch syndrome literature (varies by gene)
wild_type = 0.028
mlh1_pathogenic = 0.54  # ~54% lifetime risk
msh2_pathogenic = 0.54  # ~54% lifetime risk
msh6_pathogenic = 0.49  # ~49% lifetime risk
pms2_pathogenic = 0.15  # ~15% lifetime risk

[mlh_msh.screening]
pathogenic = [
    "Colonoscopy every 1-2 years starting age 20-25",
    "Annual endometrial biopsy starting age 30-35",
    "Annual transvaginal ultrasound",
    "Upper endoscopy every 3-5 years",
    "Annual urinalysis",
    "Consider aspirin chemoprevention",
]

